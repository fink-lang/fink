name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      bump: ${{ steps.calc.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          # Get latest tag (or default to v0.0.0)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG"

          # Parse current version
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="none"
          if echo "$COMMITS" | grep -qE "^BREAKING CHANGE:|^[a-z]+(\(.+\))?!:"; then
            if [ "$MAJOR" -eq 0 ]; then
              # Pre-1.0: breaking changes bump minor
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            fi
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            # feat always bumps minor
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Next version: v$VERSION (bump: $BUMP)"

  comment-pr:
    name: Comment Version on PR
    needs: version
    if: github.event_name == 'pull_request' && needs.version.outputs.bump != 'none'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment version
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: release-version
          message: |
            📦 This PR will release **v${{ needs.version.outputs.version }}** (${{ needs.version.outputs.bump }}) when merged.

  release:
    name: Create Release
    needs: version
    if: github.event_name == 'push' && needs.version.outputs.bump != 'none'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --generate-notes
