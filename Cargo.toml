[workspace]
members = [
  ".",
  "crates/test-macros",
]
resolver = "2"

[package]
name = "fink"
version = "0.0.0" # derived from git tags at publish time
edition = "2024"


[features]
# compiler: exposes compile_fnk (Fink source → WASM binary). Safe for wasm32 targets.
# wasm-encoder and wasmparser are always-on deps; this feature gates the API surface.
compiler = []
# wat: WAT disassembly via wasmprinter. Implies compiler. wasm32 safe.
wat = ["compiler", "dep:wasmprinter"]
# runner: native execution (wasmtime) + debugger (dap). Implies compiler + wat.
runner = ["compiler", "wat", "dep:wat-crate", "dep:wasmtime", "dep:dap", "dep:tokio"]
default = ["compiler", "wat", "runner"]

[dependencies]
wasm-encoder = "0.245"
wasmparser = "0.245"
wasmprinter = { version = "0.245", optional = true }
wat-crate = { package = "wat", version = "1", features = ["dwarf"], optional = true }
wasmtime = { version = "43", features = ["debug"], optional = true }
dap = { version = "0.4.1-alpha1", optional = true }
tokio = { version = "1", features = ["rt"], optional = true }

[dev-dependencies]
test-macros = { path = "crates/test-macros" }
pretty_assertions = "1"
