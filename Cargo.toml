[workspace]
members = [
  ".",
  "crates/test-macros",
]
resolver = "2"

[package]
name = "fink"
version = "0.1.0"
edition = "2024"

[dependencies]
v8 = "146.8.0"
wat = { version = "1", features = ["dwarf"] }
tungstenite = "0.26"

[dev-dependencies]
test-macros = { path = "crates/test-macros" }
pretty_assertions = "1"
